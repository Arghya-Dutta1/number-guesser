name: Lint Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Run ESLint and capture output
        id: lint
        run: |
          npm run lint > lint.txt || true

      - name: Comment PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: lint.txt