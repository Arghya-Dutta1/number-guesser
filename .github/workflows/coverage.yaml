name: Test & Coverage

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 0" # Sunday 11 PM UTC

permissions:
  contents: write # needed for badge commit
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      # 🧪 Run tests with coverage
      - name: Run Tests
        run: npm run test:coverage -- --coverageReporters=json-summary

      # 📊 Extract coverage %
      - name: Extract Coverage
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          else
            COVERAGE=0
          fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Store Coverage History
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
                  # Create file if not exists
          if [ ! -f coverage-history.json ]; then
            echo "[]" > coverage-history.json
          fi
                  # Append new entry with timestamp
          jq ". + [{\"date\": \"$(date +%F)\", \"coverage\": $COVERAGE}]" coverage-history.json > temp.json
          mv temp.json coverage-history.json

      - name: Commit Coverage History
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add coverage-history.json
          git commit -m "Update coverage history" || echo "No changes"
          git push

      # ❌ Enforce minimum coverage
      - name: Enforce Coverage Threshold
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          if [ -z "$COVERAGE" ]; then
            COVERAGE=0
          fi
          MIN_THRESHOLD=40
          if (( $(echo "$COVERAGE < $MIN_THRESHOLD" | bc -l) )); then
            echo "❌ Coverage below ${MIN_THRESHOLD}%"
          fi

      # 🏷️ Update README badge
      - name: Update Coverage Badge
        if: github.event_name != 'pull_request'
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}

          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          BADGE="![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR})"

          if grep -q "!\[Coverage\]" README.md; then
            sed -i "s|!\[Coverage\].*|$BADGE|" README.md
          else
            echo "$BADGE" >> README.md
          fi

      - name: Commit Badge
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update coverage badge" || echo "No changes"
          git push

      # 🧾 Create report
      - name: Format Report
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}

          echo "### 🧪 Test Coverage Report" > report.md
          echo "" >> report.md
          echo "📊 Coverage: **$COVERAGE%**" >> report.md

          if (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            echo "✅ Above minimum threshold" >> report.md
          else
            echo "❌ Below minimum threshold" >> report.md
          fi

      # 💬 PR comment (only for PR)
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: report.md

      # 🧾 Workflow summary (manual/scheduled)
      - name: Add to Workflow Summary
        if: github.event_name != 'pull_request'
        run: |
          cat report.md >> $GITHUB_STEP_SUMMARY
