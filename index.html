<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Number Guesser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🤖 AI Number Guesser</h1>
    <p>Think of a number between 1 and 100</p>

    <h2 id="guess">Press Start</h2>

    <div class="buttons">
      <button onclick="startGame()">Start</button>
      <button onclick="tooLow()">Too Low 📉</button>
      <button onclick="tooHigh()">Too High 📈</button>
      <button onclick="correct()">Correct ✅</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
