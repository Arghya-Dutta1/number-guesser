<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Number Guesser</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🤖 AI Number Guesser</h1>
      <p>Think of a number between 1 and 100</p>

      <h2 id="guess">Press Start</h2>

      <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="tooLowBtn">Too Low 📉</button>
        <button id="tooHighBtn">Too High 📈</button>
        <button id="correctBtn">Correct ✅</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
